<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIKAS88 - Premium Gaming Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #130d2e; color: #ffffff; font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-[#130d2e] text-white min-h-screen flex flex-col justify-between overflow-x-hidden">

    <header class="bg-[#140e2b] px-4 py-3 flex items-center justify-between border-b border-purple-950/40 sticky top-0 z-40 shadow-md">
        <button onclick="toggleMenu()" class="text-gray-200 text-xl p-1 focus:outline-none active:scale-90 transition">
            <i class="fa-solid fa-bars"></i>
        </button>
        
        <div class="flex items-center gap-1">
            <span class="text-2xl font-black tracking-wider text-white">
                <span class="text-amber-500">B</span>IKAS88
            </span>
        </div>

        <div class="flex items-center gap-1 bg-[#231944] px-3 py-1.5 rounded-full border border-purple-900/40 text-xs font-bold text-gray-200">
            <span class="w-4 h-4 rounded-full bg-emerald-600 inline-block border border-white/20"></span>
            <span>৳ BDT</span>
        </div>
    </header>

    <main class="flex-1 w-full max-w-md mx-auto pb-24">
        
        <div class="p-3">
            <div class="w-full h-44 bg-gradient-to-br from-purple-900 to-indigo-950 rounded-2xl overflow-hidden relative border border-purple-800/40 shadow-lg flex items-center justify-center text-center px-6">
                <div>
                    <h3 class="text-amber-400 font-black text-lg tracking-wide">বন্ধুদের রেফার করুন!</h3>
                    <p class="text-xs text-gray-200 mt-1 font-medium">প্রতিদিন আনলিমিটেড কমিশন পান। প্রতি ডিপোজিট ও বেট থেকে আয় করুন।</p>
                    <button class="mt-3 bg-amber-400 text-black font-black text-[10px] px-4 py-2 rounded-lg uppercase shadow-md">এখনই ক্লেইম করুন!</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 w-full shadow-xl border-y border-purple-950/40">
            <button onclick="openAuthModal('login')" class="bg-[#191238] text-[#ffc107] font-black py-4 text-base tracking-wide border-r border-purple-950/60 active:bg-purple-950/40 transition">
                প্রবেশ করুন
            </button>
            <button onclick="openAuthModal('register')" class="bg-[#ffc107] text-black font-black py-4 text-base tracking-wide active:bg-amber-500 transition">
                নিবন্ধন
            </button>
        </div>

        <div class="p-4">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-wider mb-3">জনপ্রিয় গেম ক্যাটাগরি</h3>
            <div class="grid grid-cols-3 gap-2 text-center text-[11px] font-bold text-gray-300">
                <div class="bg-[#1b143a] p-4 rounded-xl border border-purple-950/40"><i class="fa-solid fa-fire text-pink-500 text-xl mb-1.5"></i><p>হট গেমস</p></div>
                <div class="bg-[#1b143a] p-4 rounded-xl border border-purple-950/40"><i class="fa-solid fa-cricket-bat-ball text-amber-400 text-xl mb-1.5"></i><p>ক্রিকেট</p></div>
                <div class="bg-[#1b143a] p-4 rounded-xl border border-purple-950/40"><i class="fa-solid fa-cards text-amber-400 text-xl mb-1.5"></i><p>ক্যাসিনো</p></div>
            </div>
        </div>
    </main>

    <div id="globalOverlay" onclick="closeAllPanels()" class="fixed inset-0 bg-black/70 z-50 hidden backdrop-blur-xs transition-opacity duration-300"></div>

    <div id="sidebarMenu" class="fixed inset-y-0 left-0 w-[85%] max-w-[360px] bg-[#1a1235] z-50 transform -translate-x-full transition-transform duration-300 ease-in-out overflow-y-auto no-scrollbar pb-16">
        <div class="flex justify-between items-center px-4 py-4 border-b border-purple-950/40 bg-[#140e2b]">
            <span class="text-xl font-black text-white tracking-wide">BIKAS88</span>
            <button onclick="closeAllPanels()" class="text-gray-400 p-2 text-xl active:scale-75 transition"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <div class="p-4 bg-[#1a1235]">
            <div class="bg-gradient-to-b from-[#311052] to-[#160d31] p-4 rounded-2xl border border-purple-900/60 text-center shadow-lg">
                <h4 class="text-gray-200 font-bold text-sm">১১০% ওয়েলকাম বোনাস</h4>
                <p class="text-[11px] text-gray-400 mt-1">প্রথমবার যোগ দিলেই</p>
                <button class="mt-3 w-full bg-gradient-to-r from-amber-500 to-yellow-400 text-black font-black py-2.5 rounded-xl text-xs shadow-md">এখনই নিয়ে নিন</button>
                
                <div class="grid grid-cols-2 gap-2 mt-3">
                    <button onclick="openAuthModal('register')" class="bg-white text-black font-black py-2.5 rounded-xl text-xs active:scale-95 transition">নিবন্ধন</button>
                    <button onclick="openAuthModal('login')" class="bg-[#bc019b] text-white font-black py-2.5 rounded-xl text-xs active:scale-95 transition">প্রবেশ করুন</button>
                </div>
            </div>
        </div>

        <div class="px-4 grid grid-cols-3 gap-2 text-center text-[11px] font-bold text-gray-300">
            <a href="#" class="bg-[#231944] py-4 rounded-xl flex flex-col items-center gap-2 border border-purple-950/40"><i class="fa-solid fa-house text-amber-400 text-xl"></i>বাড়ি</a>
            <a href="#" class="bg-[#231944] py-4 rounded-xl flex flex-col items-center gap-2 border border-purple-950/40"><i class="fa-solid fa-cricket-bat-ball text-amber-400 text-xl"></i>ক্রিকেট</a>
            <a href="#" class="bg-[#231944] py-4 rounded-xl flex flex-col items-center gap-2 border border-purple-950/40"><i class="fa-solid fa-cards text-amber-400 text-xl"></i>লাইভ ক্যাসিনো</a>
        </div>
    </div>

    <div id="authModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 transition-all duration-300">
        <div class="bg-[#1b143a] w-full max-w-sm rounded-2xl border border-purple-900/60 shadow-2xl overflow-hidden relative">
            
            <div class="flex justify-between items-center px-5 py-4 border-b border-purple-950/40 bg-[#150e2e]">
                <span class="text-sm font-bold text-gray-200">স্বাগতম BIKAS88</span>
                <button onclick="closeAllPanels()" class="text-gray-400 hover:text-white text-lg active:scale-75 transition"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <div class="grid grid-cols-2 text-center border-b border-purple-950/40 bg-[#181135]">
                <button id="tabLogin" onclick="switchTab('login')" class="py-3 text-sm font-bold text-amber-400 border-b-2 border-amber-400">লগইন</button>
                <button id="tabRegister" onclick="switchTab('register')" class="py-3 text-sm font-bold text-gray-400">নিবন্ধন</button>
            </div>

            <div class="p-5">
                <form id="authForm" onsubmit="handleFormSubmit(event)" class="flex flex-col gap-4">
                    
                    <div class="relative">
                        <input type="text" id="authUsername" required placeholder="ইউজারনেম" class="w-full bg-[#110a26] border border-purple-900/60 rounded-xl px-4 py-3.5 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-amber-400">
                    </div>

                    <div id="phoneInputGroup" class="relative hidden">
                        <input type="tel" id="authPhone" placeholder="মোবাইল নাম্বার" class="w-full bg-[#110a26] border border-purple-900/60 rounded-xl px-4 py-3.5 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-amber-400">
                    </div>

                    <div class="relative">
                        <input type="password" id="authPassword" required placeholder="পাসওয়ার্ড" class="w-full bg-[#110a26] border border-purple-900/60 rounded-xl px-4 py-3.5 text-xs text-white placeholder-gray-500 focus:outline-none focus:border-amber-400">
                    </div>

                    <button type="submit" id="authSubmitBtn" class="w-full bg-gradient-to-r from-amber-500 via-yellow-400 to-amber-600 text-black font-black py-3.5 rounded-full text-xs shadow-lg active:scale-[0.98] transition mt-2">
                        প্রবেশ করুন
                    </button>

                    <button type="button" id="authAltBtn" onclick="toggleAuthType()" class="w-full bg-transparent border border-amber-500/40 text-amber-400 font-bold py-3.5 rounded-full text-xs active:scale-[0.98] transition">
                        নতুন অ্যাকাউন্ট খুলুন
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentMode = 'login';

        function toggleMenu() {
            const sidebar = document.getElementById('sidebarMenu');
            const overlay = document.getElementById('globalOverlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
                document.body.style.overflow = 'hidden';
            } else {
                closeAllPanels();
            }
        }

        function openAuthModal(type = 'login') {
            const sidebar = document.getElementById('sidebarMenu');
            if (sidebar) sidebar.classList.add('-translate-x-full');
            
            document.getElementById('globalOverlay').classList.remove('hidden');
            document.getElementById('authModal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            switchTab(type);
        }

        function switchTab(type) {
            currentMode = type;
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const phoneGroup = document.getElementById('phoneInputGroup');
            const submitBtn = document.getElementById('authSubmitBtn');
            const altBtn = document.getElementById('authAltBtn');
            const phoneInput = document.getElementById('authPhone');

            if (type === 'login') {
                tabLogin.className = "py-3 text-sm font-bold text-amber-400 border-b-2 border-amber-400";
                tabRegister.className = "py-3 text-sm font-bold text-gray-400";
                phoneGroup.classList.add('hidden');
                phoneInput.removeAttribute('required');
                submitBtn.innerText = "প্রবেশ করুন";
                altBtn.innerText = "নতুন অ্যাকাউন্ট খুলুন";
            } else {
                tabRegister.className = "py-3 text-sm font-bold text-amber-400 border-b-2 border-amber-400";
                tabLogin.className = "py-3 text-sm font-bold text-gray-400";
                phoneGroup.classList.remove('hidden');
                phoneInput.setAttribute('required', 'required');
                submitBtn.innerText = "নিবন্ধন সম্পন্ন করুন";
                altBtn.innerText = "ইতিমধ্যে অ্যাকাউন্ট আছে? লগইন করুন";
            }
        }

        function toggleAuthType() {
            if (currentMode === 'login') {
                switchTab('register');
            } else {
                switchTab('login');
            }
        }

        function closeAllPanels() {
            if (document.getElementById('sidebarMenu')) document.getElementById('sidebarMenu').add('-translate-x-full');
            document.getElementById('sidebarMenu').classList.add('-translate-x-full');
            document.getElementById('authModal').classList.add('hidden');
            document.getElementById('globalOverlay').classList.add('hidden');
            document.body.style.overflow = '';
        }

        // রিয়েল সার্ভার এপিআই কানেকশন
        async function handleFormSubmit(e) {
            e.preventDefault();
            
            const username = document.getElementById('authUsername').value;
            const password = document.getElementById('authPassword').value;
            const phone = document.getElementById('authPhone').value;

            const endpoint = currentMode === 'login' ? '/api/login' : '/api/register';
            const payload = currentMode === 'login' ? { username, password } : { username, password, phone };

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    alert(data.message);
                    if (currentMode === 'register') {
                        switchTab('login');
                    } else {
                        closeAllPanels();
                        // লগইন সফল হলে টোকেন বা ইউজার ডেটা সেভ করা যাবে (যেমন: localStorage.setItem('token', data.token))
                    }
                } else {
                    alert("ভুল হয়েছে: " + data.error);
                }
            } catch (error) {
                alert("সার্ভার কানেকশনে সমস্যা হচ্ছে!");
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
